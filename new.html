<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Alice Chen">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Ms+Madi&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Lexend+Deca:wght@100..900&family=Ms+Madi&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/new.css">
    <title>New</title>
</head>
<body>
    <section id="logo-section">
        <a href="index.html"><img src="../images/logo.png" class="logo" alt="logo"></a>
    </section>
    <nav class="top-bar">
        <div class="search-bar">
            <input type="text" placeholder="Search">
            <a href="" class="search-icon"><i class="fa-solid fa-magnifying-glass"></i></a>
        </div>
        <ul class="menu-links">
            <li><a href="items.html">Browse</a></li>
            <li><a href="new.html">Sell</a></li>
            <li><a href="">Sign Up</a></li>
            <li><a href="">Log In</a></li>
        </ul>
    </nav>
    <main>
        <section id="sell-section">
            <div class="sell-description">
                <h2>Sell At Wonderland Marketplace</h2>
                <p>Simply take a picture with your phone and create a listing in less than a minute!</p>
            </div>
                <form action="#">
                    <div class="category">
                        <div class="category-row">
                            <p>Condition</p>
                            <select id="condition" name="condition">
                                <option value="fresh">Fresh</option>
                                <option value="blooming">Blooming</option>
                                <option value="budding">Budding</option>
                                <option value="wilting soon">Wilting Soon</option>
                                <option value="preserved/dried">Preserved/Dried</option>
                            </select>
                        </div>
                        <div class="category-row">
                            <p>Title</p>
                            <input type="text" id="title" name="title" required>
                        </div>
                        <div class="category-row">
                            <p>Seller</p>
                            <input type="text" id="seller" name="seller" required>
                        </div>
                        <div class="category-row">
                            <p>Price</p>
                            <input type="number" id="price" name="price" min="0.00" step="0.01" max="9999.99" required>
                        </div>
                        <div class="category-row">
                            <p>Details</p>
                            <textarea id="details" name="details" required></textarea>
                        </div>
                        <div class="category-row">
                            <p>Image</p>
                            <input type="file" id="image" name="image" accept="image/*" required>
                        </div>
                        <input type="submit" value="Submit">
                    </div>
                </form>
        </section>
    </main>
    <footer>
        <p>© 2025 Wonderland Florist</p>
        <ul class="contact-links">
            <li><a href="https://twitter.com/" target="_blank"><i class="fa-brands fa-twitter"></i></a></li>
            <li><a href="https://www.facebook.com/" target="_blank"><i class="fa-brands fa-facebook-f"></i></a></li>
            <li><a href="https://www.pinterest.com/" target="_blank"><i class="fa-brands fa-pinterest-p"></i></a></li>
            <li><a href="https://www.linkedin.com/" target="_blank"><i class="fa-brands fa-linkedin-in"></i></a></li>
        </ul>
    </footer>
</body>
</html>
